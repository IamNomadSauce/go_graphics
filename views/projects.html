{{define "yield"}}
{{template "navbar"}}
<h1>{{len .}} Projects</h1>
<div class="row">
  <div class="col-2 well">
    <form action="/createProject" method="POST">
      <div class="form-group">
        <label for="title">Project Title</label>
        <input type="text" class="form-control" id="title" name="title" placeholder="Project Title">
      </div>
      <div class="form-group">
        <label for="description">message</label>
        <input type="textarea" class="form-control" id="description" name="description" placeholder="Project Description">
      </div>
      <button class="btn btn-sm btn-warning" type="submit">Create Project</button>
    </form>
  </div>
  <div class="col ">
    {{if eq (len .) 0}}
    <h5>No Projects</h5>
    {{end}}
    {{range .}}
      <!-- <input type="hidden" name="id" value="{{.Id}}"> -->
      <!-- <input type="hidden" name="selected" value="{{.Selected}}"> -->
      <div class="d-flex p-1 m-4 border-bottom border-warning justify-content-between project" onclick="this.parentNode.submit()">
        <div class="flex-column">
          <div class="">
            Title: {{.Title}}
          </div>
          <div>
            Description: {{.Description}}
          </div>
          <div>
            <span class="badge text-bg-warning">Todos: {{len .Todos}}</span>
            <!-- Selected: {{.Selected}} -->
          </div>
          <div class="d-flex justify-content-between flex-row">
            <form method="POST" action="/newTodo">
              <div class="d-flex justify-content-between">
                <div class="">
                  <input type="text" class="form-control" id="todo" name="todo" placeholder="Project Title">
                  <input type="hidden" id="project_id" name="project_id" value="{{.Id}}">
                </div>
                <div class="col">
                  <button class="btn btn-md btn-warning" type="submit">New</button>
                </div>
              </div>
            </form>
          </div>
        </div>
        <div>
          {{range .Todos}}

            <div class="border rounded m-1 p-1">
              {{.Title}}
              {{.Description}}
              {{.Completed}}
            </div>
          {{end}}
        </div>
        <div>
          <form method="POST" action="/deleteProject">
            <input type="hidden" name="id" value="{{.Id}}" >
            <button type="button submit" class="btn btn-danger btn-close"></button>
          </form>
        </div>
      </div>

    {{end}}
  </div>
</div>
{{end}}
